<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Define the pattern -->
  <defs>
    <pattern id="iconPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Shopping Cart -->
      <path d="M20 25 h3 l4 12h12l4-12h3l-5 15h-16z M25 45a3 3 0 1 0 0 6 3 3 0 0 0 0-6z M40 45a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" fill="#dedede"/>
      
      <!-- Box/Package -->
      <path d="M70 25 l10 5 l10-5 v15 l-10 5 l-10-5z M80 30v15 M70 25v15" fill="#e5e5e5"/>
      
      <!-- Tag -->
      <path d="M15 70 h15 l5 5 l-15 15 l-5-5z M23 75a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" fill="#d8d8d8"/>
      
      <!-- Store -->
      <path d="M65 65 h20 v20 h-20z M65 70 h20 M75 85v-15" fill="#e0e0e0"/>
    </pattern>
  </defs>
  
  <!-- Apply the pattern as background -->
  <rect width="100%" height="100%" fill="url(#iconPattern)"/>
