{% extends "base.html" %}

{% block content %}
<div class="w-full p-4">
    <div class="flex flex-col md:flex-row gap-6">
        <!-- Sélection des Produits -->
        <div class="w-full md:w-2/3">
            <div class="bg-white rounded-lg shadow-md">
                <!-- Header with title and search -->
                <div class="p-4 border-b border-gray-200">
                    <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                        <h4 class="text-xl font-semibold text-gray-800">Produits</h4>
                        <div class="w-full sm:w-64">
                            <form id="product-search-form" class="flex gap-2">
                                <input type="text"
                                       id="product-search"
                                       name="search"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                       placeholder="Rechercher des produits...">
                                {% if category_id %}
                                <input type="hidden" name="category" value="{{ category_id }}">
                                {% endif %}
                                <button type="submit"
                                        class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Products grid section -->
                <div class="p-4">
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="products-grid">
                        <!-- Products will be populated dynamically -->
                        <div class="col-span-full flex justify-center py-12">
                            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
                        </div>
                    </div>

                    <!-- Pagination controls -->
                    <nav class="mt-6 flex justify-center pagination-container">
                        <!-- Pagination will be populated dynamically -->
                    </nav>
                </div>
            </div>
        </div>

        <!-- Colonne du Panier -->
        <div class="w-full md:w-1/3">
            <div class="bg-white rounded-lg shadow-md sticky top-4">
                <div class="bg-blue-500 text-white p-4 rounded-t-lg">
                    <h4 class="font-semibold">Panier</h4>
                </div>
                <div class="p-4">
                    <div id="cart-items" class="space-y-4">
                        <!-- Les articles du panier seront ajoutés dynamiquement ici -->
                    </div>
                    <hr class="my-4 border-gray-200">
                    <div class="flex justify-between items-center mb-4">
                        <h5 class="font-semibold text-gray-800">Total :</h5>
                        <h5 class="font-semibold text-gray-800" id="cart-total">0,00 FCFA </h5>
                    </div>
                    <button id="checkout-btn"
                            class="w-full px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                            disabled>
                        Procéder au Paiement
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- Just placing the data here for the js to grap from the js file!! -->
<div id="receipt-data"
     data-shop-name="{{ shop_profile.name }}"
     data-shop-phones='{{ shop_phones | tojson | safe }}'
     data-shop-address="{{ shop_profile.address }}"
     data-shop-currency="{{ shop_profile.currency | default('FCFA') }}">
</div>

<div id="newCustomerModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
    <div class="min-h-screen px-4 text-center">
        <div class="inline-block align-middle bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-medium text-gray-900">Nouveau Client</h3>
                    <button onclick="closeModal('newCustomerModal')" class="text-gray-400 hover:text-gray-500">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                <form id="new-customer-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
                        <input type="text" name="name" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
                        <input type="tel" name="phone"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" name="email"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Adresse</label>
                        <textarea name="address" rows="2"
                                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                    </div>
                </form>
            </div>
            <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                <button type="button" id="save-customer-btn"
                        class="w-full sm:w-auto sm:ml-3 mb-2 sm:mb-0 inline-flex justify-center px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Enregistrer
                </button>
                <button type="button" onclick="closeModal('newCustomerModal')"
                        class="w-full sm:w-auto inline-flex justify-center px-4 py-2 bg-white text-gray-700 rounded-lg border border-gray-300 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Annuler
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Paiement -->
<div id="checkoutModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden overflow-y-auto">
    <div class="min-h-screen px-4 py-6 text-center flex items-center justify-center">
        <div class="inline-block align-middle bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-xl sm:w-full max-h-[90vh] overflow-y-auto">
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-medium text-gray-900">Paiement</h3>
                    <button onclick="closeModal('checkoutModal')" class="text-gray-400 hover:text-gray-500">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                <!-- Customer Information Section -->
                <div class="mb-6 border-b pb-6">
                    <h4 class="text-md font-medium text-gray-700 mb-4">Information Client</h4>
                    <div class="space-y-4">
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Rechercher Client</label>
                                <input type="text" id="customer-search"
                                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                       placeholder="Nom du client...">
                            </div>
                            <button id="new-customer-btn"
                                    class="mt-6 px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors">
                                Nouveau Client
                            </button>
                        </div>
                        <div id="customer-details" class="hidden">
                            <div class="bg-gray-50 p-4 rounded-lg">
                                <h5 class="font-medium text-gray-900" id="selected-customer-name"></h5>
                                <p class="text-sm text-gray-600" id="selected-customer-contact"></p>
                                <input type="hidden" id="selected-customer-id">
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Payment Information Section -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Montant Total</label>
                        <input type="text" id="modal-total" readonly
                               class="w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-lg text-gray-700">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Espèces Reçus</label>
                        <input type="text" id="cash-received"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Monnaie</label>
                        <input type="text" id="change-amount" readonly
                               class="w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-lg text-gray-700">
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 p-4 flex flex-col space-y-3 sm:p-6 sm:flex-row-reverse sm:space-y-0 sm:gap-3">
                <button type="button" id="complete-sale-btn"
                        class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Valider
                </button>

                <button type="button" id="print-bill-btn"
                        class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2 bg-gray-400 text-white rounded-lg hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:bg-gray-300 disabled:cursor-not-allowed disabled:opacity-50"
                        disabled>
                    <i data-lucide="printer" class="w-4 h-4 mr-2"></i>
                    <span>Imprimer</span>
                    <i data-lucide="bluetooth" class="w-4 h-4 ml-2 hidden" id="bluetooth-icon"></i>
                </button>

                <select id="print-format"
                        class="w-full sm:w-40 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <option value="standard">Format A4</option>
                    <option value="thermal">Format Thermique</option>
                    <option value="bluetooth">Bluetooth Thermique</option>
                </select>

                <button type="button" onclick="closeModal('checkoutModal')"
                        class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2 bg-white text-gray-700 rounded-lg border border-gray-300 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Annuler
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/cleave.js@1.6.0/dist/cleave.min.js"></script>
<script src="{{ url_for('static', filename='js/pos/main.js') }}"></script>
<script src="{{ url_for('static', filename='js/pos/cart.js') }}"></script>
<script src="{{ url_for('static', filename='js/pos/checkout.js') }}"></script>
<script src="{{ url_for('static', filename='js/pos/utils.js') }}"></script>
<script src="{{ url_for('static', filename='js/pos/customer.js') }}"></script>
<script src="{{ url_for('static', filename='js/pos/product.js') }}"></script>
{% endblock %}
