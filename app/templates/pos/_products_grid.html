<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="products-grid">
    {% for product in products.items %}
    <div class="product-item"
         data-id="{{ product.id }}"
         data-name="{{ product.name }}"
         data-price="{{ product.selling_price }}"
         data-buying-price="{{ product.buying_price }}"
         data-stock="{{ product.stock }}">
        <div class="bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow h-full">
            <div class="p-4 flex flex-col items-center">
                <h5 class="text-lg font-medium text-gray-900 mb-2">{{ product.name }}</h5>
                <p class="text-gray-600 mb-2">{{ shop_profile.currency|default('FCFA') }} {{ product.selling_price | fr_thousands }}</p>
                <p class="text-gray-500 mb-3">Stock : {{ product.stock }}</p>
                <button class="add-to-cart px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors {% if product.stock <= 0 %}opacity-50 cursor-not-allowed{% endif %}"
                        {% if product.stock <= 0 %}disabled{% endif %}>
                    Ajouter
                </button>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
