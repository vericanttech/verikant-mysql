{% if show_rollout_banner %}
<div id="rolloutBanner"
     class="sticky top-0 z-[60] w-full border-b border-amber-200 bg-amber-50 text-amber-950 shadow-sm"
     role="status">
    <div class="max-w-7xl mx-auto flex items-start gap-3 px-3 py-2.5 sm:px-4 text-sm leading-snug">
        <span class="mt-0.5 flex-shrink-0 text-amber-600" aria-hidden="true">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </span>
        <p class="flex-1 min-w-0">{{ rollout_banner_text }}</p>
        <button type="button" id="rolloutBannerClose" class="flex-shrink-0 rounded-md p-1 text-amber-700 hover:bg-amber-100 focus:outline-none focus:ring-2 focus:ring-amber-400" aria-label="Fermer l'annonce">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
</div>
<script>
(function () {
    var el = document.getElementById('rolloutBanner');
    if (!el) return;
    var btn = document.getElementById('rolloutBannerClose');
    if (btn) {
        btn.addEventListener('click', function () {
            el.remove();
        });
    }
})();
</script>
{% endif %}
