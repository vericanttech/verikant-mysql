{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-6 mt-8">
    <a href="{{ url_for('employee_loans.loan_list') }}" class="text-blue-600 hover:underline mb-4 inline-block">&larr; Retour</a>
    <h2 class="text-xl font-bold mb-6">Nouveau Prêt Employé</h2>
    <form method="POST">
        <input type="hidden" name="add_loan" value="1">
        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Employé</label>
            <select name="employee_id" class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition-colors duration-200" required>
                <option value="">Sélectionner un employé</option>
                {% for employee in employees %}
                    <option value="{{ employee.id }}">{{ employee.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Montant du prêt</label>
            <input type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition-colors duration-200" name="loan_amount" id="loan_amount" required>
        </div>
        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Date du prêt</label>
            <input type="date" class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition-colors duration-200" name="loan_date" required>
        </div>
        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Date d'échéance</label>
            <input type="date" class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition-colors duration-200" name="due_date">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Objet du prêt</label>
            <input type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition-colors duration-200" name="loan_purpose">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Plan de remboursement</label>
            <select name="repayment_schedule" class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition-colors duration-200">
                <option value="one-time">Paiement unique</option>
                <option value="monthly">Mensuel</option>
                <option value="weekly">Hebdomadaire</option>
            </select>
        </div>
        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Statut</label>
            <select name="status" class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition-colors duration-200">
                <option value="active">Actif</option>
                <option value="paid">Payé</option>
                <option value="defaulted">En défaut</option>
            </select>
        </div>
        <div class="flex justify-end space-x-2">
            <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">Ajouter</button>
        </div>
    </form>
    <div class="h-32"></div>
</div>
{% endblock %}
